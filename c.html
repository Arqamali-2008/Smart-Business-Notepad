<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cheque NotePad - AMI</title>
    <style>
        * { font-family: Arial, sans-serif; box-sizing: border-box; }
        body { background: #f4f4f4; padding: 20px; text-align: center; }
        h2 { color: #333; animation: fadeIn 1s ease-in-out; }
        .container { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 0 10px rgba(0, 0, 0, 0.1); }
        input, button { padding: 10px; margin: 5px; border: 1px solid #ccc; border-radius: 5px; width: 100%; }
        button { background: #28a745; color: white; cursor: pointer; transition: 0.3s; }
        button:hover { background: #218838; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; font-size: 12px; }
        th, td { border: 1px solid #ddd; padding: 5px; text-align: center; }
        th { background: #007bff; color: white; }
        .delete-btn { background: red; cursor: pointer; color: white; padding: 5px; border: none; }
        .fadeIn { animation: fadeIn 0.5s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        footer { margin-top: 20px; font-weight: bold; }
    </style>
</head>
<body>

    <h2>Cheque NotePad - AMI</h2>
    <div class="container">
        <input type="text" id="no" placeholder="No">
        <input type="date" id="date">
        <input type="text" id="name" placeholder="Name">
        <input type="text" id="bank" placeholder="Bank">
        <input type="number" id="amount" placeholder="Amount">
        <input type="text" id="desc" placeholder="Description">
        <button onclick="addCheque()">Add Cheque</button>
    </div>

    <h3>Filter History</h3>
    <div class="container">
        <input type="date" id="filterDay" onchange="filterHistory()">
        <input type="month" id="filterMonth" onchange="filterHistory()">
        <input type="number" id="filterYear" placeholder="Enter Year" oninput="filterHistory()">
    </div>

    <table>
        <thead>
            <tr>
                <th>No</th>
                <th>Date</th>
                <th>Name</th>
                <th>Bank</th>
                <th>Amount</th>
                <th>Description</th>
                <th>Delete</th>
            </tr>
        </thead>
        <tbody id="chequeHistory"></tbody>
    </table>

    <h3>Print Summary</h3>
    <div class="container">
        <input type="date" id="printDay">
        <button onclick="printSummary('day')">Print Day Summary</button>
        
        <input type="week" id="printWeek">
        <button onclick="printSummary('week')">Print Week Summary</button>
        
        <input type="month" id="printMonth">
        <button onclick="printSummary('month')">Print Month Summary</button>
        
        <button onclick="printSummary('all')">Print All Summary</button>
    </div>

    <footer>
        <p>©️ 2025 AMI. All Rights Reserved.</p>
        <p>Deployed by AMI</p>
    </footer>

    <script>
        let cheques = JSON.parse(localStorage.getItem("cheques")) || [];

        function addCheque() {
            let cheque = {
                no: document.getElementById("no").value,
                date: document.getElementById("date").value,
                name: document.getElementById("name").value,
                bank: document.getElementById("bank").value,
                amount: document.getElementById("amount").value,
                desc: document.getElementById("desc").value
            };

            cheques.push(cheque);
            localStorage.setItem("cheques", JSON.stringify(cheques));
            renderHistory();
            document.querySelectorAll("input").forEach(input => input.value = "");
        }

        function renderHistory(filteredCheques = cheques) {
            let historyTable = document.getElementById("chequeHistory");
            historyTable.innerHTML = "";

            filteredCheques.forEach((cheque, index) => {
                historyTable.innerHTML += `
                    <tr class="fadeIn">
                        <td>${cheque.no}</td>
                        <td>${cheque.date}</td>
                        <td>${cheque.name}</td>
                        <td>${cheque.bank}</td>
                        <td>${cheque.amount}</td>
                        <td>${cheque.desc}</td>
                        <td><button class="delete-btn" onclick="deleteCheque(${index})">X</button></td>
                    </tr>
                `;
            });
        }

        function deleteCheque(index) {
            cheques.splice(index, 1);
            localStorage.setItem("cheques", JSON.stringify(cheques));
            renderHistory();
        }

        function filterHistory() {
            let dayFilter = document.getElementById("filterDay").value;
            let monthFilter = document.getElementById("filterMonth").value;
            let yearFilter = document.getElementById("filterYear").value;

            let filtered = cheques.filter(c => {
                if (dayFilter && c.date !== dayFilter) return false;
                if (monthFilter && !c.date.startsWith(monthFilter)) return false;
                if (yearFilter && !c.date.startsWith(yearFilter)) return false;
                return true;
            });

            renderHistory(filtered);
        }

        function printSummary(type) {
            let filterDate = document.getElementById(`print${type.charAt(0).toUpperCase() + type.slice(1)}`).value;
            let filteredCheques = cheques;

            if (type !== 'all' && filterDate) {
                filteredCheques = cheques.filter(c => c.date.startsWith(filterDate));
            }

            let printWindow = window.open('', '', 'width=300,height=600');
            printWindow.document.write(`
                <html>
                <head><title>Print Summary</title></head>
                <body>
                    <h3>Cheque Summary (${type.toUpperCase()})</h3>
                    <table border="1">
                        <tr><th>No</th><th>Date</th><th>Name</th><th>Bank</th><th>Amount</th><th>Description</th></tr>
                        ${filteredCheques.map(c => `
                            <tr>
                                <td>${c.no}</td>
                                <td>${c.date}</td>
                                <td>${c.name}</td>
                                <td>${c.bank}</td>
                                <td>${c.amount}</td>
                                <td>${c.desc}</td>
                            </tr>
                        `).join("")}
                    </table>
                    <p>©️ 2025 AMI. All Rights Reserved.</p>
                </body>
                </html>
            `);
            printWindow.document.close();
            printWindow.print();
        }

        renderHistory();
    </script>

</body>
</html>
